# Development docker-compose - Infrastructure only
# Run this with: docker compose -f docker-compose.dev.yml up
# Then run API and frontends locally for hot reload

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gymnastics-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymnastics}
      POSTGRES_USER: ${POSTGRES_USER:-gymadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymadmin -d gymnastics"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: gymnastics-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gymnastics-mailhog
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Grafana LGTM Stack (Loki, Grafana, Tempo, Mimir)
  grafana:
    image: grafana/grafana:latest
    container_name: gymnastics-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus

  loki:
    image: grafana/loki:latest
    container_name: gymnastics-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  tempo:
    image: grafana/tempo:2.3.1
    container_name: gymnastics-tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo
    environment:
      - TEMPO_METRICS_GENERATOR_ENABLED=false

  prometheus:
    image: prom/prometheus:latest
    container_name: gymnastics-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  grafana_data:
  loki_data:
  tempo_data:
  prometheus_data:
