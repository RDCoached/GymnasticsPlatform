groups:
  - name: api_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_count{job="gymnastics-api",http_response_status_code=~"5.."}[5m]))
            /
            sum(rate(http_server_request_duration_seconds_count{job="gymnastics-api"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High 5xx error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          runbook: "Check recent deployments and error logs in Grafana"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_request_duration_seconds_bucket{job="gymnastics-api"}[5m])) by (le)
          ) > 2
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API latency detected"
          description: "P95 latency is {{ $value }}s (threshold: 2s)"
          runbook: "Investigate slow queries and external API calls"

      - alert: APIDown
        expr: up{job="gymnastics-api"} == 0
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API is down"
          description: "The gymnastics-api service is not responding"
          runbook: "Check container logs and restart if necessary"

  - name: database_alerts
    interval: 30s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          (npgsql_connection_pool_active_connections{job="gymnastics-api"} /
           npgsql_connection_pool_max_connections{job="gymnastics-api"}) > 0.8
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database connection pool near capacity"
          description: "Connection pool is {{ $value | humanizePercentage }} full"
          runbook: "Investigate connection leaks or increase pool size"

      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(npgsql_command_duration_seconds_bucket{job="gymnastics-api"}[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "P95 query duration is {{ $value }}s (threshold: 1s)"
          runbook: "Check for missing indexes and optimize slow queries"

      - alert: DatabaseConnectionErrors
        expr: |
          rate(npgsql_connection_errors_total{job="gymnastics-api"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection errors"
          description: "{{ $value }} connection errors per second"
          runbook: "Check database health and network connectivity"

  - name: auth_alerts
    interval: 30s
    rules:
      - alert: HighFailedLoginRate
        expr: |
          rate(http_server_request_duration_seconds_count{job="gymnastics-api",http_route="/api/auth/login",http_response_status_code=~"4.."}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: auth
        annotations:
          summary: "High failed login rate"
          description: "{{ $value }} failed logins per second"
          runbook: "Investigate potential brute force attack or credential issues"

      - alert: LoginEndpointDown
        expr: |
          sum(rate(http_server_request_duration_seconds_count{job="gymnastics-api",http_route="/api/auth/login",http_response_status_code="500"}[5m])) > 0
        for: 2m
        labels:
          severity: critical
          component: auth
        annotations:
          summary: "Login endpoint returning 500 errors"
          description: "Users cannot log in"
          runbook: "Check Keycloak connectivity and auth service logs"

  - name: infrastructure_alerts
    interval: 30s
    rules:
      - alert: HighMemoryUsage
        expr: |
          (process_working_set_bytes{job="gymnastics-api"} / process_memory_limit_bytes{job="gymnastics-api"}) > 0.85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"
          runbook: "Investigate memory leaks and GC pressure"

      - alert: ThreadPoolStarvation
        expr: dotnet_threadpool_queue_length{job="gymnastics-api"} > 50
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Thread pool starvation detected"
          description: "{{ $value }} items queued in thread pool"
          runbook: "Check for sync-over-async or blocking operations"

      - alert: HighGCPressure
        expr: |
          rate(dotnet_gc_collections_total{job="gymnastics-api",generation="2"}[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High Gen 2 GC collections"
          description: "{{ $value }} Gen 2 GCs per second"
          runbook: "Investigate memory allocations and object lifetime"
