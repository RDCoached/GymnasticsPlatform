services:
  postgres-e2e:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gymnastics_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - e2e-network

  backend-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e.backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: "Host=postgres-e2e;Port=5432;Database=gymnastics_test;Username=postgres;Password=postgres"
      E2E_MODE: "true"
    ports:
      - "5001:5001"
    depends_on:
      postgres-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - e2e-network

  frontend-e2e:
    build:
      context: ./frontend/user-portal
      dockerfile: Dockerfile.e2e
      args:
        VITE_API_URL: http://localhost:5001
        VITE_E2E_MODE: "true"
    ports:
      - "3001:3001"
    depends_on:
      backend-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - e2e-network

networks:
  e2e-network:
    driver: bridge
