services:
  traefik:
    image: traefik:v2.11
    container_name: gymnastics-traefik
    restart: unless-stopped
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.gymnastics.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"
    networks:
      - gymnastics-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: gymnastics-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymnastics}
      POSTGRES_USER: ${POSTGRES_USER:-gymadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in .env file}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymadmin -d gymnastics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gymnastics-network

  adminer:
    image: adminer:latest
    container_name: gymnastics-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`db.gymnastics.localhost`)"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
    networks:
      - gymnastics-network

  redis:
    image: redis:7-alpine
    container_name: gymnastics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - gymnastics-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gymnastics-mailhog
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailhog.rule=Host(`mail.gymnastics.localhost`)"
      - "traefik.http.services.mailhog.loadbalancer.server.port=8025"
    networks:
      - gymnastics-network

  couchdb:
    image: couchdb:3.4
    container_name: gymnastics-couchdb
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-changeme}@localhost:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.couchdb.rule=Host(`couchdb.gymnastics.localhost`)"
      - "traefik.http.services.couchdb.loadbalancer.server.port=5984"
    networks:
      - gymnastics-network

  ollama:
    image: ollama/ollama:latest
    container_name: gymnastics-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.gymnastics.localhost`)"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
    networks:
      - gymnastics-network

  api:
    build:
      context: .
      dockerfile: src/GymnasticsPlatform.Api/Dockerfile
    container_name: gymnastics-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-gymnastics};Username=${POSTGRES_USER:-gymadmin};Password=${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in .env file};Include Error Detail=true
      - ConnectionStrings__Redis=redis:6379
      - Observability__OtlpEndpoint=http://tempo:4318
      - OTEL_LOG_LEVEL=debug
      - Logging__LogLevel__OpenTelemetry=Debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.gymnastics.localhost`)"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    networks:
      - gymnastics-network

  user-portal:
    image: node:25-alpine
    container_name: gymnastics-user-portal
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/user-portal:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user-portal.rule=Host(`app.gymnastics.localhost`)"
      - "traefik.http.services.user-portal.loadbalancer.server.port=3001"
    networks:
      - gymnastics-network

  admin-portal:
    image: node:25-alpine
    container_name: gymnastics-admin-portal
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3002:3002"
    volumes:
      - ./frontend/admin-portal:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-portal.rule=Host(`admin.gymnastics.localhost`)"
      - "traefik.http.services.admin-portal.loadbalancer.server.port=3002"
    networks:
      - gymnastics-network

  # Grafana LGTM Stack (Loki, Grafana, Tempo, Mimir)
  grafana:
    image: grafana/grafana:latest
    container_name: gymnastics-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.gymnastics.localhost`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - gymnastics-network

  loki:
    image: grafana/loki:latest
    container_name: gymnastics-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=Host(`loki.gymnastics.localhost`)"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
    networks:
      - gymnastics-network

  tempo:
    image: grafana/tempo:2.3.1
    container_name: gymnastics-tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo
    environment:
      - TEMPO_METRICS_GENERATOR_ENABLED=false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tempo.rule=Host(`tempo.gymnastics.localhost`)"
      - "traefik.http.services.tempo.loadbalancer.server.port=3200"
    networks:
      - gymnastics-network

  prometheus:
    image: prom/prometheus:latest
    container_name: gymnastics-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.gymnastics.localhost`)"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    networks:
      - gymnastics-network

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  loki_data:
  tempo_data:
  prometheus_data:
  couchdb_data:
  ollama_data:

networks:
  gymnastics-network:
    driver: bridge
