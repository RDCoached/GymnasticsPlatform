name: QA Autonomous Agent

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  qa-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need previous commit for diff analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get commit info
        id: commit-info
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT

      - name: Analyze changes
        id: analyze
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Categorize changes using grep (avoids subshell variable issues)
          BACKEND_CHANGED=false
          FRONTEND_USER_CHANGED=false
          FRONTEND_ADMIN_CHANGED=false
          TESTS_CHANGED=false

          # Check backend changes
          if echo "$CHANGED_FILES" | grep -qE '^(src/|tests/)'; then
            BACKEND_CHANGED=true
          fi

          # Check frontend user portal changes (exclude test files)
          if echo "$CHANGED_FILES" | grep -E '^frontend/user-portal/src/' | grep -qvE '\.test\.'; then
            FRONTEND_USER_CHANGED=true
          fi

          # Check frontend admin portal changes (exclude test files)
          if echo "$CHANGED_FILES" | grep -E '^frontend/admin-portal/src/' | grep -qvE '\.test\.'; then
            FRONTEND_ADMIN_CHANGED=true
          fi

          # Check test changes
          if echo "$CHANGED_FILES" | grep -qE '(\.test\.|^tests/)'; then
            TESTS_CHANGED=true
          fi

          echo "backend_changed=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "frontend_user_changed=$FRONTEND_USER_CHANGED" >> $GITHUB_OUTPUT
          echo "frontend_admin_changed=$FRONTEND_ADMIN_CHANGED" >> $GITHUB_OUTPUT
          echo "tests_changed=$TESTS_CHANGED" >> $GITHUB_OUTPUT

      - name: Install dependencies (Backend)
        if: steps.analyze.outputs.backend_changed == 'true'
        run: |
          cd /home/runner/work/GymnasticsPlatform/GymnasticsPlatform
          dotnet restore

      - name: Install dependencies (User Portal)
        if: steps.analyze.outputs.frontend_user_changed == 'true'
        run: |
          cd frontend/user-portal
          npm ci

      - name: Install dependencies (Admin Portal)
        if: steps.analyze.outputs.frontend_admin_changed == 'true'
        run: |
          cd frontend/admin-portal
          npm ci

      - name: Run Backend Tests
        id: backend-tests
        if: steps.analyze.outputs.backend_changed == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          dotnet test --no-restore --verbosity normal --logger "trx;LogFileName=backend-test-results.trx" 2>&1 | tee backend-test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT
          exit $TEST_EXIT_CODE

      - name: Run User Portal Tests
        id: user-portal-tests
        if: steps.analyze.outputs.frontend_user_changed == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          cd frontend/user-portal
          npm run test:ci 2>&1 | tee ../../user-portal-test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT
          exit $TEST_EXIT_CODE

      - name: Run Admin Portal Tests
        id: admin-portal-tests
        if: steps.analyze.outputs.frontend_admin_changed == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          cd frontend/admin-portal
          npm run test:ci 2>&1 | tee ../../admin-portal-test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT
          exit $TEST_EXIT_CODE

      - name: Check test results
        id: check-results
        run: |
          BACKEND_FAILED=false
          USER_PORTAL_FAILED=false
          ADMIN_PORTAL_FAILED=false

          if [[ "${{ steps.backend-tests.outputs.exit_code }}" != "0" ]] && [[ "${{ steps.analyze.outputs.backend_changed }}" == "true" ]]; then
            BACKEND_FAILED=true
          fi

          if [[ "${{ steps.user-portal-tests.outputs.exit_code }}" != "0" ]] && [[ "${{ steps.analyze.outputs.frontend_user_changed }}" == "true" ]]; then
            USER_PORTAL_FAILED=true
          fi

          if [[ "${{ steps.admin-portal-tests.outputs.exit_code }}" != "0" ]] && [[ "${{ steps.analyze.outputs.frontend_admin_changed }}" == "true" ]]; then
            ADMIN_PORTAL_FAILED=true
          fi

          TESTS_FAILED=false
          if [[ "$BACKEND_FAILED" == "true" ]] || [[ "$USER_PORTAL_FAILED" == "true" ]] || [[ "$ADMIN_PORTAL_FAILED" == "true" ]]; then
            TESTS_FAILED=true
          fi

          echo "backend_failed=$BACKEND_FAILED" >> $GITHUB_OUTPUT
          echo "user_portal_failed=$USER_PORTAL_FAILED" >> $GITHUB_OUTPUT
          echo "admin_portal_failed=$ADMIN_PORTAL_FAILED" >> $GITHUB_OUTPUT
          echo "tests_failed=$TESTS_FAILED" >> $GITHUB_OUTPUT

      - name: Create issue body from template
        if: steps.check-results.outputs.tests_failed == 'true'
        id: issue-body
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | head -20)

          # Export variables for template substitution
          export COMMIT_SHORT_SHA="${{ steps.commit-info.outputs.short_sha }}"
          export COMMIT_AUTHOR="${{ steps.commit-info.outputs.author }}"
          export COMMIT_MESSAGE="${{ steps.commit-info.outputs.message }}"
          export COMMIT_URL="${{ github.event.head_commit.url }}"
          export GITHUB_SERVER_URL="${{ github.server_url }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export GITHUB_RUN_ID="${{ github.run_id }}"
          export BACKEND_FAILED="${{ steps.check-results.outputs.backend_failed }}"
          export USER_PORTAL_FAILED="${{ steps.check-results.outputs.user_portal_failed }}"
          export ADMIN_PORTAL_FAILED="${{ steps.check-results.outputs.admin_portal_failed }}"
          export CHANGED_FILES="$CHANGED_FILES"

          # Build the issue body manually (envsubst doesn't handle conditional logic well)
          ISSUE_BODY="## 🤖 QA Agent: Test Failures Detected

**Commit:** [\`${COMMIT_SHORT_SHA}\`](${COMMIT_URL}) by ${COMMIT_AUTHOR}
**Message:** ${COMMIT_MESSAGE}

---

### ❌ Failed Test Suites
"

          if [[ "$BACKEND_FAILED" == "true" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
- **Backend Tests** (.NET/xUnit)"
          fi

          if [[ "$USER_PORTAL_FAILED" == "true" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
- **User Portal Tests** (Vitest)"
          fi

          if [[ "$ADMIN_PORTAL_FAILED" == "true" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
- **Admin Portal Tests** (Vitest)"
          fi

          ISSUE_BODY="${ISSUE_BODY}

### 📊 Test Results

View full test output: [GitHub Actions Run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})

Download test logs: [Artifacts](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}#artifacts)

---

### 🔍 Diagnostic Information

#### Changed Files in This Commit
\`\`\`
${CHANGED_FILES}
\`\`\`

#### Next Steps

The QA agent should:

1. **Analyze the test failures** from the logs
2. **Identify root cause** by examining:
   - Changed files in the commit
   - Test error messages and stack traces
   - Missing mocks or test setup
   - API changes that broke existing tests
3. **Generate fixes** following TDD principles:
   - Update test mocks to match new API signatures
   - Add missing test setup/teardown
   - Fix test assertions to match new behavior
4. **Create PR** with fixes and explanation

---

### 🛠️ Manual Fix Instructions

To investigate and fix locally:

\`\`\`bash
# Checkout the failing commit
git checkout ${COMMIT_SHORT_SHA}

# Run tests locally"

          if [[ "$BACKEND_FAILED" == "true" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
dotnet test"
          fi

          if [[ "$USER_PORTAL_FAILED" == "true" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
cd frontend/user-portal && npm test"
          fi

          if [[ "$ADMIN_PORTAL_FAILED" == "true" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
cd frontend/admin-portal && npm test"
          fi

          ISSUE_BODY="${ISSUE_BODY}
\`\`\`

---

### 📝 Common Failure Patterns

#### Frontend Test Failures
- **Unmocked API calls**: Component calls new API method that isn't mocked in tests
- **Missing props/context**: Component expects new props or context values
- **Async timing**: useEffect or async operations not properly awaited in tests

#### Backend Test Failures
- **Database state**: Tests expect specific database state that isn't set up
- **Missing dependencies**: New service dependencies not injected in tests
- **Authorization**: Tests need updated authentication/authorization setup

---

**Status:** 🔴 Awaiting Analysis
"

          # Save to file for gh issue create
          echo "$ISSUE_BODY" > /tmp/issue-body.md

          # Also output for debugging
          echo "Issue body created with $(wc -l < /tmp/issue-body.md) lines"

      - name: Create GitHub issue
        if: steps.check-results.outputs.tests_failed == 'true'
        run: |
          gh issue create \
            --title "🤖 QA Agent: Test Failures in ${{ steps.commit-info.outputs.short_sha }}" \
            --body-file /tmp/issue-body.md \
            --label "qa-agent,test-failure,automated,priority-high"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.commit-info.outputs.short_sha }}
          path: |
            backend-test-output.log
            user-portal-test-output.log
            admin-portal-test-output.log
            backend-test-results.trx
          retention-days: 30

  test-gap-analysis:
    name: Proactive Test Gap Analysis
    runs-on: ubuntu-latest
    needs: qa-analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get commit info
        id: commit-info
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT

      - name: Analyze changed files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Find new/modified source files
          NEW_SOURCE_FILES=""
          MODIFIED_SOURCE_FILES=""

          while IFS= read -r file; do
            # Backend source files (not tests)
            if [[ $file == src/**/*.cs ]] && [[ $file != *Test*.cs ]]; then
              if ! git cat-file -e HEAD~1:"$file" 2>/dev/null; then
                NEW_SOURCE_FILES="$NEW_SOURCE_FILES$file\n"
              else
                MODIFIED_SOURCE_FILES="$MODIFIED_SOURCE_FILES$file\n"
              fi
            fi

            # Frontend source files (not tests)
            if [[ $file == frontend/*/src/**/*.tsx ]] || [[ $file == frontend/*/src/**/*.ts ]]; then
              if [[ $file != *.test.* ]] && [[ $file != *.spec.* ]]; then
                if ! git cat-file -e HEAD~1:"$file" 2>/dev/null; then
                  NEW_SOURCE_FILES="$NEW_SOURCE_FILES$file\n"
                else
                  MODIFIED_SOURCE_FILES="$MODIFIED_SOURCE_FILES$file\n"
                fi
              fi
            fi
          done <<< "$CHANGED_FILES"

          echo "new_source_files<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NEW_SOURCE_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "modified_source_files<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MODIFIED_SOURCE_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for missing test files
        id: missing-tests
        run: |
          MISSING_TESTS=""
          NEW_FILES="${{ steps.changed-files.outputs.new_source_files }}"

          while IFS= read -r file; do
            if [[ -z "$file" ]]; then continue; fi

            # Backend: Check for corresponding test file
            if [[ $file == src/**/*.cs ]]; then
              # Convert src path to test path
              TEST_FILE=$(echo "$file" | sed 's|^src/|tests/|' | sed 's|\.cs$|Tests.cs|')
              if [[ ! -f "$TEST_FILE" ]]; then
                MISSING_TESTS="$MISSING_TESTS- $file (expected: $TEST_FILE)\n"
              fi
            fi

            # Frontend: Check for corresponding test file
            if [[ $file == frontend/*/src/**/*.tsx ]] || [[ $file == frontend/*/src/**/*.ts ]]; then
              # Check for .test.tsx or .test.ts file
              BASE="${file%.*}"
              EXT="${file##*.}"
              TEST_FILE="${BASE}.test.${EXT}"

              if [[ ! -f "$TEST_FILE" ]]; then
                MISSING_TESTS="$MISSING_TESTS- $file (expected: $TEST_FILE)\n"
              fi
            fi
          done <<< "$NEW_FILES"

          echo "missing_tests<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MISSING_TESTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [[ -n "$MISSING_TESTS" ]]; then
            echo "has_missing_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_missing_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Install backend dependencies
        run: dotnet restore

      - name: Generate backend coverage report
        id: backend-coverage
        continue-on-error: true
        run: |
          dotnet test --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --verbosity quiet

          # Install ReportGenerator
          dotnet tool install -g dotnet-reportgenerator-globaltool || true

          # Generate coverage report
          reportgenerator \
            -reports:./coverage/**/coverage.cobertura.xml \
            -targetdir:./coverage-report \
            -reporttypes:"TextSummary;Html" || echo "Coverage report generation failed"

          # Extract coverage percentage
          if [[ -f ./coverage-report/Summary.txt ]]; then
            COVERAGE=$(grep "Line coverage:" ./coverage-report/Summary.txt | grep -oP '\d+\.\d+%' | head -1 || echo "N/A")
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

            # Flag if coverage is low
            COVERAGE_NUM=$(echo "$COVERAGE" | sed 's/%//')
            if (( $(echo "$COVERAGE_NUM < 80" | bc -l) )); then
              echo "low_coverage=true" >> $GITHUB_OUTPUT
            else
              echo "low_coverage=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "coverage=N/A" >> $GITHUB_OUTPUT
            echo "low_coverage=false" >> $GITHUB_OUTPUT
          fi

      - name: Install frontend dependencies
        run: |
          cd frontend/user-portal && npm ci
          cd ../admin-portal && npm ci

      - name: Generate frontend coverage report
        id: frontend-coverage
        continue-on-error: true
        run: |
          # User Portal
          cd frontend/user-portal
          npm run test:coverage -- --reporter=json --reporter=text-summary > coverage-summary.txt 2>&1 || true
          USER_COVERAGE=$(grep -oP '\d+\.\d+%' coverage-summary.txt | tail -1 || echo "N/A")
          echo "user_coverage=$USER_COVERAGE" >> $GITHUB_OUTPUT

          # Admin Portal
          cd ../admin-portal
          npm run test:coverage -- --reporter=json --reporter=text-summary > coverage-summary.txt 2>&1 || true
          ADMIN_COVERAGE=$(grep -oP '\d+\.\d+%' coverage-summary.txt | tail -1 || echo "N/A")
          echo "admin_coverage=$ADMIN_COVERAGE" >> $GITHUB_OUTPUT

      - name: Analyze edge case coverage
        id: edge-cases
        run: |
          # Scan test files for common edge case patterns
          EDGE_CASE_GAPS=""

          # Check for error handling tests
          ERROR_TESTS=$(grep -r "throw\|error\|Error" src/ --include="*.cs" | wc -l)
          ERROR_TEST_COVERAGE=$(grep -r "throw\|error\|Error\|exception" tests/ --include="*.cs" | wc -l)

          if (( ERROR_TESTS > ERROR_TEST_COVERAGE * 2 )); then
            EDGE_CASE_GAPS="$EDGE_CASE_GAPS- Insufficient error handling test coverage\n"
          fi

          # Check for null/empty validation tests
          NULL_CHECKS=$(grep -r "IsNullOrEmpty\|IsNullOrWhiteSpace\|null" src/ --include="*.cs" | wc -l)
          NULL_TEST_COVERAGE=$(grep -r "null\|empty\|Empty" tests/ --include="*.cs" | wc -l)

          if (( NULL_CHECKS > NULL_TEST_COVERAGE * 2 )); then
            EDGE_CASE_GAPS="$EDGE_CASE_GAPS- Missing null/empty validation tests\n"
          fi

          # Check for boundary condition tests
          BOUNDARY_TESTS=$(grep -r "GreaterThan\|LessThan\|Between\|Range" tests/ --include="*.cs" | wc -l)

          if (( BOUNDARY_TESTS < 10 )); then
            EDGE_CASE_GAPS="$EDGE_CASE_GAPS- Limited boundary condition testing\n"
          fi

          echo "edge_case_gaps<<EOF" >> $GITHUB_OUTPUT
          echo -e "$EDGE_CASE_GAPS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [[ -n "$EDGE_CASE_GAPS" ]]; then
            echo "has_edge_case_gaps=true" >> $GITHUB_OUTPUT
          else
            echo "has_edge_case_gaps=false" >> $GITHUB_OUTPUT
          fi

      - name: Build test gap issue body
        if: |
          steps.missing-tests.outputs.has_missing_tests == 'true' ||
          steps.backend-coverage.outputs.low_coverage == 'true' ||
          steps.edge-cases.outputs.has_edge_case_gaps == 'true'
        id: gap-issue-body
        run: |
          COMMIT_SHORT_SHA="${{ steps.commit-info.outputs.short_sha }}"
          COMMIT_AUTHOR="${{ steps.commit-info.outputs.author }}"
          COMMIT_MESSAGE="${{ steps.commit-info.outputs.message }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          BACKEND_COVERAGE="${{ steps.backend-coverage.outputs.coverage }}"
          USER_COVERAGE="${{ steps.frontend-coverage.outputs.user_coverage }}"
          ADMIN_COVERAGE="${{ steps.frontend-coverage.outputs.admin_coverage }}"
          MISSING_TESTS="${{ steps.missing-tests.outputs.missing_tests }}"
          EDGE_CASE_GAPS="${{ steps.edge-cases.outputs.edge_case_gaps }}"
          GITHUB_SERVER_URL="${{ github.server_url }}"
          GITHUB_REPOSITORY="${{ github.repository }}"
          GITHUB_RUN_ID="${{ github.run_id }}"

          ISSUE_BODY="## 🔍 QA Agent: Test Coverage Gaps Detected

**Commit:** [\`${COMMIT_SHORT_SHA}\`](${COMMIT_URL}) by ${COMMIT_AUTHOR}
**Message:** ${COMMIT_MESSAGE}

---

### 📊 Coverage Analysis
"

          if [[ -n "$BACKEND_COVERAGE" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
**Backend Coverage:** ${BACKEND_COVERAGE}%"
          fi

          if [[ -n "$USER_COVERAGE" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
**User Portal Coverage:** ${USER_COVERAGE}%"
          fi

          if [[ -n "$ADMIN_COVERAGE" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
**Admin Portal Coverage:** ${ADMIN_COVERAGE}%"
          fi

          ISSUE_BODY="${ISSUE_BODY}

View coverage reports: [GitHub Actions Artifacts](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}#artifacts)

---

### 🚨 Missing Test Files
"

          if [[ -n "$MISSING_TESTS" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
The following source files were added or modified but lack corresponding test files:

\`\`\`
${MISSING_TESTS}
\`\`\`
"
          else
            ISSUE_BODY="${ISSUE_BODY}
All source files have corresponding test files. ✅
"
          fi

          ISSUE_BODY="${ISSUE_BODY}

---

### ⚠️ Edge Case Coverage Gaps
"

          if [[ -n "$EDGE_CASE_GAPS" ]]; then
            ISSUE_BODY="${ISSUE_BODY}
The following edge case patterns were not adequately covered:

${EDGE_CASE_GAPS}
"
          else
            ISSUE_BODY="${ISSUE_BODY}
Edge case patterns appear adequately covered. ✅
"
          fi

          ISSUE_BODY="${ISSUE_BODY}

---

### 🎯 Recommendations

#### For Missing Test Files

Create corresponding test files for each source file:

**Backend (.NET)**
- \`Foo.cs\` → \`tests/.../FooTests.cs\`
- Use xUnit with \`[Fact]\` and \`[Theory]\` attributes
- Include integration tests with \`WebApplicationFactory\` + \`Testcontainers\`

**Frontend (TypeScript/React)**
- \`Component.tsx\` → \`Component.test.tsx\`
- Use Vitest + React Testing Library
- Test behavior through user interactions, not implementation details

#### Edge Cases to Test

Common edge cases that should be covered:
- **Null/undefined handling**: Input is null, undefined, or missing
- **Empty collections**: Arrays/lists are empty
- **Boundary values**: Min/max values for numbers, empty strings vs whitespace
- **Error conditions**: Network failures, validation errors, database errors
- **Authentication/Authorization**: Unauthenticated requests, insufficient permissions
- **Race conditions**: Concurrent updates, idempotency
- **Invalid input**: Malformed data, type mismatches

---

### 🛠️ Next Steps

1. **Create missing test files** for newly added source files
2. **Add edge case tests** for identified gaps
3. **Increase coverage** to target threshold (80%+ backend, 70%+ frontend)
4. **Follow TDD principles**: Red → Green → Refactor
5. **Test behavior, not implementation**: Use public APIs and user interactions

---

**Status:** 🟡 Awaiting Test Implementation
"

          echo "$ISSUE_BODY" > /tmp/gap-issue-body.md
          echo "Gap issue body created"

      - name: Create test gap GitHub issue
        if: |
          steps.missing-tests.outputs.has_missing_tests == 'true' ||
          steps.backend-coverage.outputs.low_coverage == 'true' ||
          steps.edge-cases.outputs.has_edge_case_gaps == 'true'
        run: |
          gh issue create \
            --title "🔍 QA Agent: Test Gaps in ${{ steps.commit-info.outputs.short_sha }}" \
            --body-file /tmp/gap-issue-body.md \
            --label "qa-agent,test-gap,automated,priority-medium"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ steps.commit-info.outputs.short_sha }}
          path: |
            coverage-report/
            frontend/user-portal/coverage/
            frontend/admin-portal/coverage/
          retention-days: 30
