name: QA Autonomous Agent

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  qa-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need previous commit for diff analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get commit info
        id: commit-info
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT

      - name: Analyze changes
        id: analyze
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Categorize changes
          BACKEND_CHANGED=false
          FRONTEND_USER_CHANGED=false
          FRONTEND_ADMIN_CHANGED=false
          TESTS_CHANGED=false

          while IFS= read -r file; do
            if [[ $file == src/* ]] || [[ $file == tests/* ]]; then
              BACKEND_CHANGED=true
            fi
            if [[ $file == frontend/user-portal/src/* ]] && [[ $file != *.test.* ]]; then
              FRONTEND_USER_CHANGED=true
            fi
            if [[ $file == frontend/admin-portal/src/* ]] && [[ $file != *.test.* ]]; then
              FRONTEND_ADMIN_CHANGED=true
            fi
            if [[ $file == *.test.* ]] || [[ $file == tests/* ]]; then
              TESTS_CHANGED=true
            fi
          done <<< "$CHANGED_FILES"

          echo "backend_changed=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "frontend_user_changed=$FRONTEND_USER_CHANGED" >> $GITHUB_OUTPUT
          echo "frontend_admin_changed=$FRONTEND_ADMIN_CHANGED" >> $GITHUB_OUTPUT
          echo "tests_changed=$TESTS_CHANGED" >> $GITHUB_OUTPUT

      - name: Install dependencies (Backend)
        if: steps.analyze.outputs.backend_changed == 'true'
        run: |
          cd /home/runner/work/GymnasticsPlatform/GymnasticsPlatform
          dotnet restore

      - name: Install dependencies (User Portal)
        if: steps.analyze.outputs.frontend_user_changed == 'true'
        run: |
          cd frontend/user-portal
          npm ci

      - name: Install dependencies (Admin Portal)
        if: steps.analyze.outputs.frontend_admin_changed == 'true'
        run: |
          cd frontend/admin-portal
          npm ci

      - name: Run Backend Tests
        id: backend-tests
        if: steps.analyze.outputs.backend_changed == 'true'
        continue-on-error: true
        run: |
          dotnet test --no-restore --verbosity normal --logger "trx;LogFileName=backend-test-results.trx" 2>&1 | tee backend-test-output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run User Portal Tests
        id: user-portal-tests
        if: steps.analyze.outputs.frontend_user_changed == 'true'
        continue-on-error: true
        run: |
          cd frontend/user-portal
          npm run test:ci 2>&1 | tee ../../user-portal-test-output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run Admin Portal Tests
        id: admin-portal-tests
        if: steps.analyze.outputs.frontend_admin_changed == 'true'
        continue-on-error: true
        run: |
          cd frontend/admin-portal
          npm run test:ci 2>&1 | tee ../../admin-portal-test-output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check test results
        id: check-results
        run: |
          BACKEND_FAILED=false
          USER_PORTAL_FAILED=false
          ADMIN_PORTAL_FAILED=false

          if [[ "${{ steps.backend-tests.outputs.exit_code }}" != "0" ]] && [[ "${{ steps.analyze.outputs.backend_changed }}" == "true" ]]; then
            BACKEND_FAILED=true
          fi

          if [[ "${{ steps.user-portal-tests.outputs.exit_code }}" != "0" ]] && [[ "${{ steps.analyze.outputs.frontend_user_changed }}" == "true" ]]; then
            USER_PORTAL_FAILED=true
          fi

          if [[ "${{ steps.admin-portal-tests.outputs.exit_code }}" != "0" ]] && [[ "${{ steps.analyze.outputs.frontend_admin_changed }}" == "true" ]]; then
            ADMIN_PORTAL_FAILED=true
          fi

          TESTS_FAILED=false
          if [[ "$BACKEND_FAILED" == "true" ]] || [[ "$USER_PORTAL_FAILED" == "true" ]] || [[ "$ADMIN_PORTAL_FAILED" == "true" ]]; then
            TESTS_FAILED=true
          fi

          echo "backend_failed=$BACKEND_FAILED" >> $GITHUB_OUTPUT
          echo "user_portal_failed=$USER_PORTAL_FAILED" >> $GITHUB_OUTPUT
          echo "admin_portal_failed=$ADMIN_PORTAL_FAILED" >> $GITHUB_OUTPUT
          echo "tests_failed=$TESTS_FAILED" >> $GITHUB_OUTPUT

      - name: Trigger QA Agent Analysis
        if: steps.check-results.outputs.tests_failed == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🤖 QA Agent: Test Failures Detected in ${{ steps.commit-info.outputs.short_sha }}"
          content-filepath: .github/workflows/qa-agent-issue-template.md
          labels: |
            qa-agent
            test-failure
            automated
        env:
          COMMIT_SHA: ${{ steps.commit-info.outputs.sha }}
          COMMIT_SHORT_SHA: ${{ steps.commit-info.outputs.short_sha }}
          COMMIT_MESSAGE: ${{ steps.commit-info.outputs.message }}
          COMMIT_AUTHOR: ${{ steps.commit-info.outputs.author }}
          BACKEND_FAILED: ${{ steps.check-results.outputs.backend_failed }}
          USER_PORTAL_FAILED: ${{ steps.check-results.outputs.user_portal_failed }}
          ADMIN_PORTAL_FAILED: ${{ steps.check-results.outputs.admin_portal_failed }}

      - name: Setup Claude Code CLI
        if: steps.check-results.outputs.tests_failed == 'true'
        run: |
          # Install Claude Code CLI if available
          # This is a placeholder - adjust based on actual CLI availability
          echo "Claude Code CLI setup would go here"

      - name: Invoke QA Agent to Fix Tests
        if: steps.check-results.outputs.tests_failed == 'true'
        run: |
          echo "QA Agent would analyze and fix tests here"
          # This would call Claude Code agent with the QA skill
          # For now, we'll create a script that can be run manually

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.commit-info.outputs.short_sha }}
          path: |
            backend-test-output.log
            user-portal-test-output.log
            admin-portal-test-output.log
            backend-test-results.trx
          retention-days: 30
