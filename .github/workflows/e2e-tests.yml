name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gymnastics_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Keycloak
        run: |
          docker run -d \
            --name keycloak \
            --network host \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
            -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
            -e KC_DB=postgres \
            -e KC_DB_URL="jdbc:postgresql://localhost:5432/gymnastics_test?currentSchema=keycloak" \
            -e KC_DB_USERNAME=postgres \
            -e KC_DB_PASSWORD=postgres \
            -e KC_HTTP_ENABLED=true \
            -e KC_HEALTH_ENABLED=true \
            -e KC_HOSTNAME_STRICT=false \
            -e KC_HOSTNAME_URL=http://localhost:8080 \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            quay.io/keycloak/keycloak:26.0.7 \
            start-dev

          echo "Waiting for Keycloak to be ready..."
          timeout 180 bash -c 'until curl -sf http://localhost:8080/health/ready 2>/dev/null; do echo "Waiting..."; sleep 5; done'
          echo "Keycloak is ready!"
          sleep 5

      - name: Configure Keycloak Realm
        run: |
          # Get admin access token
          TOKEN=$(curl -X POST "http://localhost:8080/realms/master/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=admin" \
            -d "password=admin" \
            -d "grant_type=password" \
            -d "client_id=admin-cli" \
            | jq -r '.access_token')

          # Create gymnastics realm
          curl -X POST "http://localhost:8080/admin/realms" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "realm": "gymnastics",
              "enabled": true,
              "registrationAllowed": true,
              "registrationEmailAsUsername": true,
              "resetPasswordAllowed": true,
              "rememberMe": true,
              "editUsernameAllowed": false,
              "loginWithEmailAllowed": true
            }'

          # Create gymnastics-api client
          curl -X POST "http://localhost:8080/admin/realms/gymnastics/clients" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "clientId": "gymnastics-api",
              "enabled": true,
              "publicClient": false,
              "standardFlowEnabled": true,
              "directAccessGrantsEnabled": true,
              "serviceAccountsEnabled": true,
              "protocol": "openid-connect"
            }'

          # Create user-portal client with PKCE
          curl -X POST "http://localhost:8080/admin/realms/gymnastics/clients" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "clientId": "user-portal",
              "enabled": true,
              "publicClient": true,
              "standardFlowEnabled": true,
              "directAccessGrantsEnabled": false,
              "redirectUris": ["http://localhost:5173/*", "http://localhost:3001/*"],
              "webOrigins": ["http://localhost:5173", "http://localhost:3001"],
              "protocol": "openid-connect",
              "attributes": {
                "pkce.code.challenge.method": "S256"
              }
            }'

          echo "Keycloak realm configured successfully!"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/user-portal/package-lock.json
            tests/e2e/package-lock.json

      - name: Install backend dependencies
        run: dotnet restore

      - name: Build backend
        run: dotnet build --no-restore --configuration Release

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Run database migrations
        run: dotnet ef database update --project src/Modules/Auth/Auth.Infrastructure --startup-project src/GymnasticsPlatform.Api
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=gymnastics_test;Username=postgres;Password=postgres"

      - name: Install frontend dependencies
        working-directory: frontend/user-portal
        run: npm ci

      - name: Build frontend
        working-directory: frontend/user-portal
        run: npm run build

      - name: Install E2E test dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        run: |
          cd src/GymnasticsPlatform.Api
          dotnet run --no-build --configuration Release &
          echo $! > ${{ runner.temp }}/backend.pid
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5137
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=gymnastics_test;Username=postgres;Password=postgres"
          Authentication__Keycloak__Authority: "http://localhost:8080/realms/gymnastics"
          Authentication__Keycloak__Audience: "gymnastics-api"
          Authentication__Keycloak__RequireHttpsMetadata: "false"
          Authentication__Keycloak__ValidIssuers__0: "http://localhost:8080/realms/gymnastics"
          Keycloak__AdminBaseUrl: "http://localhost:8080"
          Keycloak__Realm: "gymnastics"
          Keycloak__AdminClientId: "admin-cli"
          Keycloak__AdminUsername: "admin"
          Keycloak__AdminPassword: "admin"

      - name: Start frontend server
        run: |
          cd frontend/user-portal
          npm run dev &
          echo $! > ${{ runner.temp }}/frontend.pid
        env:
          VITE_API_URL: http://localhost:5137
          VITE_KEYCLOAK_URL: http://localhost:8080
          VITE_KEYCLOAK_REALM: gymnastics
          VITE_KEYCLOAK_CLIENT_ID: user-portal

      - name: Wait for servers to be ready
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:5137/health; do echo "  Backend not ready, retrying..."; sleep 2; done'
          echo "✓ Backend is ready!"

          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf -I http://localhost:5173 | head -1 | grep -q "200"; do echo "  Frontend not ready, retrying..."; sleep 2; done'
          echo "✓ Frontend is ready!"

          echo "Verifying Keycloak connectivity..."
          curl -sf http://localhost:8080/health/ready > /dev/null && echo "✓ Keycloak is accessible!"

          echo "Giving servers additional time to stabilize..."
          sleep 10

          echo "All services are ready for E2E tests!"

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npm run test:ci
        env:
          CI: true
          DATABASE_CONNECTION_STRING: "Host=localhost;Port=5432;Database=gymnastics_test;Username=postgres;Password=postgres"

      - name: Stop servers
        if: always()
        run: |
          kill $(cat ${{ runner.temp }}/backend.pid) 2>/dev/null || true
          kill $(cat ${{ runner.temp }}/frontend.pid) 2>/dev/null || true
          docker stop keycloak 2>/dev/null || true
          docker rm keycloak 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: tests/e2e/test-results/
          retention-days: 7
