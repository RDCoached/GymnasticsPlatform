name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Future-proof for Node.js 24

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gymnastics_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/user-portal/package-lock.json
            tests/e2e/package-lock.json

      - name: Install backend dependencies
        run: dotnet restore

      - name: Build backend
        run: dotnet build --no-restore --configuration Release

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Run database migrations
        run: dotnet ef database update --project src/Modules/Auth/Auth.Infrastructure --startup-project src/GymnasticsPlatform.Api
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=gymnastics_test;Username=postgres;Password=postgres"

      - name: Install frontend dependencies
        working-directory: frontend/user-portal
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        run: |
          cd src/GymnasticsPlatform.Api
          dotnet run --no-build --configuration Release &
          echo $! > ${{ runner.temp }}/backend.pid
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5001
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=gymnastics_test;Username=postgres;Password=postgres"
          E2E_MODE: "true"

      - name: Start frontend server
        run: |
          cd frontend/user-portal
          npm run dev &
          echo $! > ${{ runner.temp }}/frontend.pid
        env:
          VITE_API_URL: http://localhost:5001
          VITE_E2E_MODE: "true"

      - name: Wait for servers to be ready
        run: |
          echo "Waiting for backend..."
          timeout 90 bash -c 'until curl -sf http://localhost:5001/health; do echo "  Backend not ready, retrying..."; sleep 2; done'
          echo "✓ Backend is ready!"

          echo "Waiting for frontend..."
          timeout 90 bash -c 'until curl -sf -I http://localhost:3001 | head -1 | grep -q "200"; do echo "  Frontend not ready, retrying..."; sleep 2; done'
          echo "✓ Frontend is ready!"

          echo "Giving servers additional time to stabilize..."
          sleep 10

          echo "✓ All services are ready for E2E tests!"

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npm run test:ci
        env:
          CI: true
          DATABASE_CONNECTION_STRING: "Host=localhost;Port=5432;Database=gymnastics_test;Username=postgres;Password=postgres"

      - name: Stop servers
        if: always()
        run: |
          kill $(cat ${{ runner.temp }}/backend.pid) 2>/dev/null || true
          kill $(cat ${{ runner.temp }}/frontend.pid) 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: tests/e2e/test-results/
          retention-days: 7
